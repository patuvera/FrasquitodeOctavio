<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frasquito de Octavio</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #f7c6cc, #e63946);
  font-family: 'Georgia', serif;
}

.container{
  text-align:center;
  background: rgba(255,255,255,0.15);
  padding:40px;
  border-radius:25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

h1{
  margin:0;
  color:white;
  font-size:26px;
}

.subtitle{
  color:white;
  opacity:0.85;
  margin:10px 0 30px;
  font-size:15px;
}

.jar{
  width:180px;
  height:230px;
  margin:0 auto;
  position:relative;
  cursor:pointer;
  transition:0.25s;
}

.jar:hover{
  transform: scale(1.05);
}

.glass{
  width:180px;
  height:210px;
  border:4px solid #ffd6dc;
  border-radius:40px 40px 55px 55px;
  background: rgba(255,255,255,0.25);
  position:absolute;
  bottom:0;
}

.lid{
  width:200px;
  height:30px;
  background:#ffd6dc;
  border-radius:12px;
  position:absolute;
  top:0;
  left:-10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.tag{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  color:#e63946;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.heart{
  position:absolute;
  font-size:20px;
  animation: float 4s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.note{
  margin-top:35px;
  display:none;
  background:white;
  padding:18px;
  border-radius:14px;
  font-size:16px;
  color:#b31217;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  animation: pop 0.35s ease;
  max-width:260px;
  margin-left:auto;
  margin-right:auto;
}

@keyframes pop{
  from{transform:scale(0.7) translateY(10px); opacity:0;}
  to{transform:scale(1) translateY(0); opacity:1;}
}

.gold{
  background: linear-gradient(135deg,#d4af37,#f7e7a9);
  color:#5a3d00;
}

/* Música */
.music-player{
  margin-top:25px;
}

.controls{
  margin-top:10px;
}

.controls button{
  background:white;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.2s;
}

.controls button:hover{
  transform:scale(1.05);
}

.controls input[type=range]{
  width:120px;
  margin-left:10px;
}
</style>
</head>

<body>

<!-- Reproductor oculto -->
<iframe 
  id="youtubePlayer"
  width="0"
  height="0"
  src="https://www.youtube.com/embed/5r4aLNqSkyE?autoplay=1&loop=1&playlist=5r4aLNqSkyE&enablejsapi=1"
  frameborder="0"
  allow="autoplay">
</iframe>

<div class="container">
  <h1>Frasquito de Octavio ✨</h1>
  <div class="subtitle">Sacá un papelito cuando lo necesites 💌</div>

  <div class="jar" onclick="drawNote()">
    <div class="lid"></div>
    <div class="glass"></div>
    <div class="tag">LOVE</div>

    <div class="heart" style="bottom:25px; left:25px;">💗</div>
    <div class="heart" style="bottom:35px; left:70px;">💖</div>
    <div class="heart" style="bottom:30px; left:115px;">💕</div>
    <div class="heart" style="bottom:70px; left:40px;">💘</div>
    <div class="heart" style="bottom:75px; left:95px;">💞</div>
    <div class="heart" style="bottom:110px; left:60px;">💓</div>
    <div class="heart" style="bottom:120px; left:115px;">💝</div>
    <div class="heart" style="bottom:115px; left:20px;">💗</div>
  </div>

  <div id="note" class="note"></div>

  <!-- Controles -->
  <div class="music-player">
    <div class="controls">
      <button onclick="toggleMusic()" id="playBtn">⏸️ Pausa</button>
      <input type="range" min="0" max="100" value="50" onchange="changeVolume(this.value)">
    </div>
  </div>
</div>

<script>
const frases = [

function drawNote(){
  const note = document.getElementById("note");
  const random = Math.floor(Math.random()*frases.length);
  note.className = "note";

  if(frases[random].includes("VIP") || frases[random].includes("No todos")){
    note.classList.add("gold");
  }

  note.innerText = frases[random];
  note.style.display = "block";
}

/* YouTube Player */
let player;
let isPlaying = true;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('youtubePlayer', {
    events: {
      'onReady': (event) => {
        event.target.setVolume(50);
      }
    }
  });
}

// Cargar API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function toggleMusic(){
  if(!player) return;

  if(isPlaying){
    player.pauseVideo();
    document.getElementById("playBtn").innerText = "▶️ Play";
  } else {
    player.playVideo();
    document.getElementById("playBtn").innerText = "⏸️ Pausa";
  }

  isPlaying = !isPlaying;
}

function changeVolume(value){
  if(player){
    player.setVolume(value);
  }
}
</script>

</body>
</html>
